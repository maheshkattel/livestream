        .phalaHeaderContainer {

            margin-bottom: 10px;

        .phalaHeaderContainer img {

            height: 50px;
            /* Maintain aspect ratio */
            margin-right: 20px;
        }

        .phalaTvContainer {
            width: 100%;

            border-radius: 0px;

            align-items: center;
            flex-wrap: wrap;
        }

        .phalaTvContainer img {
            width: 100px;
            height: auto;
            border-radius: 5px;

        }

        .center-align {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 10px;
        }

        iframe {
            width: 100%;
            height: 620px;

        @media (max-width: 768px) {
            .phalaHeaderContainer {

            }

            .phalaHeaderContainer img {
                width: 40px;

                height: auto;
                /* Maintain aspect ratio */
                margin-right: 10px;
            }

            .phalaTvContainer img {
                width: 100px;
                height: 100px;
                margin-bottom: 10px;
            }

            iframe {
                height: 350px;
            }
        }

    <script>

        // Alert when developer tools are opened
        function detectDevTools() {
            if (window.chrome && window.chrome.devtools) {
                alert("Developer tools detected!");
            }
        }
        setInterval(detectDevTools, 1000); // Check every second
        document.onkeydown = function (event) {
            if (event.keyCode == 123 || (event.ctrlKey && event.shiftKey && event.keyCode == 'I'.charCodeAt(0)) ||
                (event.ctrlKey && event.shiftKey && event.keyCode == 'J'.charCodeAt(0)) ||
                (event.ctrlKey && event.keyCode == 'U'.charCodeAt(0))) {
                return false;
            }
        }
