<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XML Display</title>
</head>
<body>
  <h1>XML Content</h1>
  <div id="xml-content"></div>
  
  <script>
    fetch('phalaTv.xml')
      .then(response => response.text())
      .then(data => {
        document.getElementById('xml-content').textContent = data;
      });
  </script>
</body>
</html>
