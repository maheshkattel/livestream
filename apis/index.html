<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Streaming Core</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.6.2/plyr.polyfilled.js"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.6.2/plyr.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; }
        .view-layer { position: absolute; inset: 0; width: 100%; height: 100%; display: none; }
        video, iframe { width: 100%; height: 100%; border: none; background: #000; object-fit: contain; }
        .plyr { height: 100% !important; }
    </style>
</head>
<body>

    <div id="shaka-layer" class="view-layer" data-shaka-player-container>
        <video id="shaka-video" autoplay playsinline></video>
    </div>

    <div id="plyr-layer" class="view-layer">
        <video id="plyr-video" controls playsinline class="plyr"></video>
    </div>

    <div id="iframe-layer" class="view-layer">
        <iframe id="sandbox-iframe" sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation" allowfullscreen></iframe>
    </div>

    <script>
        async function runUniversalEngine() {
            const urlParams = new URLSearchParams(window.location.search);
            const channelId = urlParams.get('id');
            if (!channelId) return;

            try {
                const response = await fetch('playlist.json');
                const playlist = await response.json();
                const target = playlist[channelId];
                if (!target) return;

                // TECHNIQUE A: DRM DASH PROCESSING
                if (target.engine === 'shaka') {
                    document.getElementById('shaka-layer').style.display = 'block';
                    const video = document.getElementById('shaka-video');
                    const player = new shaka.Player(video);
                    new shaka.ui.Overlay(player, document.getElementById('shaka-layer'), video);
                    
                    player.configure({
                        streaming: { bufferingGoal: 15, rebufferingGoal: 5, jumpLargeGaps: true },
                        drm: { clearKeys: target.clearKeys || {} }
                    });
                    await player.load(target.url);
                } 
                // TECHNIQUE B: HIGH BUFFER HLS PLAYBACK
                else if (target.engine === 'plyr') {
                    document.getElementById('plyr-layer').style.display = 'block';
                    const video = document.getElementById('plyr-video');
                    
                    if (Hls.isSupported()) {
                        const hls = new Hls({ maxMaxBufferLength: 100 });
                        hls.loadSource(target.url);
                        hls.attachMedia(video);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => new Plyr(video));
                    } else {
                        video.src = target.url;
                        new Plyr(video);
                    }
                } 
                // TECHNIQUE C: SANDBOX EMBED WRAPPING
                else if (target.engine === 'iframe') {
                    document.getElementById('iframe-layer').style.display = 'block';
                    document.getElementById('sandbox-iframe').src = target.url;
                }

            } catch (err) {
                console.error("Playback Initialization Failure:", err);
            }
        }

        document.addEventListener('shaka-ui-loaded', runUniversalEngine);
        // Fallback execution option if Shaka UI framework delays tracking initialization
        setTimeout(() => { if(document.getElementById('shaka-layer').style.display === 'none' && !window.playerInitialized) runUniversalEngine(); }, 1200);
    </script>
</body>
</html>
