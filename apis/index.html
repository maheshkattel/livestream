<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Gateway</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; font-family: sans-serif; }
        #wrapper { position: absolute; inset: 0; width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }
        #error-msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; display: none; text-align: center; }
    </style>
</head>
<body>

    <div id="error-msg">
        <h3>No Stream Requested</h3>
        <p>Please add ?id=telemundo to your URL link.</p>
    </div>

    <div id="wrapper">
        <iframe id="player-frame" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
    </div>

    <script>
        async function initContainer() {
            const params = new URLSearchParams(window.location.search);
            const streamId = params.get('id');

            if (!streamId) {
                document.getElementById('error-msg').style.display = 'block';
                return;
            }

            try {
                const response = await fetch('playlist.json');
                const playlist = await response.json();
                const target = playlist[streamId];

                if (target && target.url) {
                    // Set the source directly to their verified running player wrapper
                    document.getElementById('player-frame').src = target.url.trim();
                } else {
                    document.getElementById('error-msg').innerText = `Channel "${streamId}" not found in playlist.json.`;
                    document.getElementById('error-msg').style.display = 'block';
                }
            } catch (e) {
                console.error("Failed to parse configurations", e);
            }
        }
        window.addEventListener('DOMContentLoaded', initContainer);
    </script>
</body>
</html>
