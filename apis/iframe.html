<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phala TV - Iframe Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; }
    iframe { width: 100%; height: 100vh; border: none; }
  </style>
</head>
<body>
  <iframe id="frame"
    sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation"
    allowfullscreen allowtransparency="true" frameborder="0"></iframe>

  <script>
    (function () {
      const url = new URLSearchParams(window.location.search).get('url');
      if (url) document.getElementById('frame').src = url;
    })();
  </script>
</body>
</html>
