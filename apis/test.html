        .site-wrap {
            width: 100%;
            background: #FDFCFB;
        }

        .outer-wrap {
            width: 1000px;
            margin: 0 auto;
            padding: 0;
            overflow: hidden;
        }

        .inner-wrap {
            width: auto;
            margin: 0;
            padding: 0;
        }

        .main-wrap {
            width: 100%;
            margin: 0 auto;
            padding: 0;
        }

        .instagram-wrap,
        .footer-wrap {
            width: 100%;
            margin: 0;
            padding: 0;
            text-align: justify;
        }

        @media screen and (max-width: 850px) {
            .categories-wrap #categories .Image {
                margin-right: 10px !important;
                margin-bottom: 10px !important;
            }

            .categories-wrap .widget.Image h2 {
                font-size: 16px !important;
            }

            .categories-wrap .widget.Image img {
                width: 38px !important;
                height: 38px !important;
            }

            .home-title {
                font-size: 25px !important;
            }

            .outer-wrap {
                width: 90%;
                margin: 0 auto;
            }

            .main-wrap {
                width: 100%;
                float: none;
            }
        }

        @media screen and (min-width: 851px) and (max-width: 1150px) {
            .outer-wrap {
                width: 90%;
                margin: 0 auto;
            }

            .main-wrap {
                width: 70%;
            }
        }

        /*-------------------
Blog Content
-------------------*/
        body {
            font-family: 'Karla', sans-serif;
            font-weight: 400;
            font-size: 14px;
            color: #000000;
            letter-spacing: 0px;
            overflow-x: hidden;
        }

        a {
            -webkit-transition: all 0.2s ease;
            -moz-transition: all 0.2s ease;
            -ms-transition: all 0.2s ease;
            -o-transition: all 0.2s ease;
            transition: all 0.2s ease;
        }

        a,
        a:visited,
        a:hover {
            text-decoration: none;
        }

        .post-body a {
            font-weight: 400;
            text-decoration: none;
            color: #D52C1F;
            position: relative;
        }

        .post-body a:hover {
            color: #3367D6;
            text-decoration: none;
        }

        .separator a {
            max-width: 100%;
            height: auto;
            margin-right: 0em !important;
            margin-left: 0em !important;
        }

        a img {
            display: block;
            position: static !important;
            border-bottom: 0 !important;
        }

        .post-body {
            width: 100%;
            text-align: justify;
            line-height: 1.6;
            position: relative;
        }

        .post-body img,
        .post-body a img {
            max-width: 100% !important;
            height: auto;
            margin: 0 !important;
            float: none !important;
            display: inline !important;
        }

        .post-body ol {
            padding: 0 0 0 2.5em;
            list-style: decimal;
            list-style-type: decimal;
        }

        .post-body h1,
        .post-body h2 {
            font-family: 'Bodoni Moda', serif;
            font-weight: 400;
            letter-spacing: -1px;
        }

        .post-body p {
            margin: 15px 15%;
        }

        .video_outer_wrap {
            width: 100%;
            max-width: 100%;
        }

        .video_wrap {
            position: relative;
            padding-bottom: 56%;
            padding-top: 0px;
            height: 0;
            background-color: #FDFCFB !important;
        }

        .video_wrap iframe,
        .video_wrap object,
        .video_wrap embed {
            width: 100%;
            height: 100%;
            top: 0;
            position: absolute;
        }

        iframe,
        .YOUTUBE-iframe-video {
            max-width: 100%;
        }

        input,
        textarea {
            outline: 0;
            -webkit-appearance: none;
            -webkit-border-radius: 0;
        }

        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px #FDFCFB inset;
        }

        .widget-item-control {
            height: 0px;
        }

        @media screen and (max-width: 550px) {
            .post-body p {
                margin: 15px 30px;
            }
        }

        /*-------------------
Social & Search
-------------------*/
        .top-wrap {
            width: 100%;
            height: 60px;
            top: 0;
            left: 0;
            margin: 0 auto;
            padding: 0;
            z-index: 9;
            position: fixed;
            background: transparent;
            border: 0;
            text-align: center;
        }

        #HTML97 {
            width: 40%;
            text-align: left;
            float: left;
            padding-left: 20px;
        }

        #HTML98 {
            width: 40%;
            float: right;
            padding-right: 25px;
        }

        #HTML97 .widget-content {
            width: auto;
            height: 60px;
            line-height: 60px;
            display: inline-block;
            vertical-align: middle;
        }

        .top-socialmedia a {
            font-size: 9.5px;
            margin: 0 5px !important;
            display: inline-block;
            color: #000000;
        }

        .top-socialmedia a:hover {
            color: #e3c9bf;
        }

        .search {
            width: 130px;

            padding: 0;
            background: transparent;
