<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPD Stream Player</title>
    <!-- Shaka Player UI Stylesheet -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <!-- Shaka Player Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }
        .video-container {
            width: 80%;
            max-width: 900px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            background-color: #111;
        }
        video {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div class="video-container" data-shaka-player-container>
    <!-- The video element inside the Shaka UI container -->
    <video data-shaka-player id="video" autoplay controls></video>
</div>

<script>
    const manifestUri = 'https://live-oneapp-prd-news.akamaized.net/Content/CMAF_OL2-CTR-4s-v2/Live/channel(kvea)/master.mpd';

    async function initApp() {
        // Install built-in polyfills to handle cross-browser compatibility
        shaka.polyfil.installAll();

        // Check if the browser supports the required features
        if (shaka.Player.isBrowserSupported()) {
            initPlayer();
        } else {
            console.error('Browser not supported for DASH playback.');
        }
    }

    async function initPlayer() {
        const video = document.getElementById('video');
        const ui = video['ui'];
        const player = ui.getPlayer();

        // Optional: Add ClearKey configuration here if your stream requires decryption keys
        /*
        player.configure({
            drm: {
                clearKeys: {
                    'ce7ab3022e753307997f58afe001bac4': '72d631a66e635c60829a0fe7705516c1'
                }
            }
        });
        */

        // Listen for errors
        player.addEventListener('error', onPlayerErrorEvent);
        
        try {
            // Load the MPD manifest file
            await player.load(manifestUri);
            console.log('The video has been loaded successfully!');
        } catch (error) {
            onPlayerError(error);
        }
    }

    function onPlayerErrorEvent(event) {
        onPlayerError(event.detail);
    }

    function onPlayerError(error) {
        console.error('Error code', error.code, 'object', error);
    }

    // Initialize the player when the DOM content is ready
    document.addEventListener('shaka-ui-loaded', initApp);
</script>

</body>
</html>
