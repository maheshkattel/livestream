<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Video Player</title>
<style>
    /* Style for video container */
    #video-container {
        height: 600px;
        width: 100%;
    }
</style>
</head>
<body>
    <div id="video-container">
        <video id="live-video" controls autoplay style="width: 100%; height: 100%;">
            <!-- Fallback content in case the video can't be played -->
            <source src="https://inst2.ignores.top/js/rajasthan-royals-vs-mumbai-indians/2/playlist.m3u8" type="application/x-mpegURL">
            Your browser does not support the video tag.
        </video>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        if (Hls.isSupported()) {
            var video = document.getElementById('live-video');
            var hls = new Hls();
            hls.loadSource('https://inst2.ignores.top/js/rajasthan-royals-vs-mumbai-indians/2/playlist.m3u8');
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = 'https://inst2.ignores.top/js/rajasthan-royals-vs-mumbai-indians/2/playlist.m3u8';
        } else {
            console.error('HLS is not supported on your browser.');
        }
    </script>
</body>
</html>
