<!DOCTYPE html>
<html>
<head>
    <title>Firestore Match Uploader</title>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // Your Firebase config (replace with your own if needed)
        const firebaseConfig = {
            apiKey: "AIzaSyBTEFOKEYD08IE2VAD8O1TevrIgn30tzN4",
            authDomain: "online-food-delivery-7f53f.firebaseapp.com",
            projectId: "online-food-delivery-7f53f",
            storageBucket: "online-food-delivery-7f53f.appspot.com",
            messagingSenderId: "886466466698",
            appId: "1:886466466698:web:f6731f824f01575abcae73"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.uploadMatches = async function() {
            const jsonText = document.getElementById('jsonInput').value;
            if (!jsonText.trim()) {
                alert('Please paste JSON data');
                return;
            }

            let data;
            try {
                data = JSON.parse(jsonText);
            } catch(e) {
                alert('Invalid JSON: ' + e.message);
                return;
            }

            const events = data.events;
            if (!events || !Array.isArray(events)) {
                alert('JSON must contain an "events" array');
                return;
            }

            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = 'Processing...';

            // Collect all unique leagues, teams, matches
            const leaguesMap = new Map();   // leagueId -> data
            const teamsMap = new Map();     // teamId -> data
            const matchesList = [];

            for (const ev of events) {
                // ----- League (using uniqueTournament) -----
                const league = ev.tournament.uniqueTournament || ev.tournament;
                const leagueId = String(league.id);
                if (!leaguesMap.has(leagueId)) {
                    leaguesMap.set(leagueId, {
                        id: leagueId,
                        name: league.name,
                        slug: league.slug,
                        category: league.category?.name || '',
                        season: ev.season?.name || '',
                        year: ev.season?.year || '',
                        primaryColor: league.primaryColorHex || '',
                        secondaryColor: league.secondaryColorHex || '',
                        isGroup: ev.tournament.isGroup || false,
                        groupName: ev.tournament.groupName || null
                    });
                }

                // ----- Home Team -----
                const home = ev.homeTeam;
                const homeId = String(home.id);
                if (!teamsMap.has(homeId)) {
                    teamsMap.set(homeId, {
                        id: homeId,
                        name: home.name,
                        slug: home.slug,
                        shortName: home.shortName,
                        country: home.country?.alpha2 || '',
                        ranking: home.ranking || null,
                        teamColors: home.teamColors || {}
                    });
                }

                // ----- Away Team -----
                const away = ev.awayTeam;
                const awayId = String(away.id);
                if (!teamsMap.has(awayId)) {
                    teamsMap.set(awayId, {
                        id: awayId,
                        name: away.name,
                        slug: away.slug,
                        shortName: away.shortName,
                        country: away.country?.alpha2 || '',
                        ranking: away.ranking || null,
                        teamColors: away.teamColors || {}
                    });
                }

                // ----- Match -----
                matchesList.push({
                    id: String(ev.id),
                    leagueId: leagueId,
                    homeTeamId: homeId,
                    awayTeamId: awayId,
                    startTimestamp: ev.startTimestamp,
                    status: ev.status,
                    round: ev.roundInfo?.round || 0,
                    groupName: ev.tournament.groupName || null,
                    slug: ev.slug,
                    hasGlobalHighlights: ev.hasGlobalHighlights || false,
                    customId: ev.customId || ''
                });
            }

            // Use batched writes (max 500 per batch)
            const BATCH_LIMIT = 490;
            let batches = [];
            let currentBatch = writeBatch(db);
            let opCount = 0;

            function addToBatch(ref, data) {
                if (opCount >= BATCH_LIMIT) {
                    batches.push(currentBatch);
                    currentBatch = writeBatch(db);
                    opCount = 0;
                }
                currentBatch.set(ref, data, { merge: true });
                opCount++;
            }

            // 1. Upload leagues
            for (const [id, leagueData] of leaguesMap) {
                const ref = doc(db, 'leagues', id);
                addToBatch(ref, leagueData);
            }

            // 2. Upload teams
            for (const [id, teamData] of teamsMap) {
                const ref = doc(db, 'teams', id);
                addToBatch(ref, teamData);
            }

            // 3. Upload matches
            for (const match of matchesList) {
                const ref = doc(db, 'matches', match.id);
                addToBatch(ref, match);
            }

            // Push last batch
            if (opCount > 0) batches.push(currentBatch);

            // Commit all batches
            let completed = 0;
            for (let i = 0; i < batches.length; i++) {
                try {
                    await batches[i].commit();
                    completed++;
                    statusDiv.innerHTML = `Progress: ${completed}/${batches.length} batches committed...`;
                } catch (err) {
                    console.error(err);
                    statusDiv.innerHTML = `Error in batch ${i+1}: ${err.message}`;
                    return;
                }
            }

            statusDiv.innerHTML = `✅ Success! Uploaded ${leaguesMap.size} leagues, ${teamsMap.size} teams, ${matchesList.length} matches.`;
        };
    </script>
</head>
<body>
    <h2>📤 Upload Match JSON to Firestore</h2>
    <p>Paste your JSON (must contain an <code>events</code> array). Works for any league (World Cup, Premier League, etc.)</p>
    <textarea id="jsonInput" rows="15" cols="80" placeholder='{"events": [...]}'></textarea><br/>
    <button onclick="uploadMatches()">Upload to Firestore</button>
    <div id="status" style="margin-top: 20px; font-weight: bold;"></div>
</body>
</html>
